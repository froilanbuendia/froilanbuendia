<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Serverless Portfolio — Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">froilanbuendia.com</text>

  <!-- Route 53 -->
  <rect x="370" y="90" width="160" height="56" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="113" text-anchor="middle" font-size="14" font-weight="600" fill="#3730a3">Route 53</text>
  <text x="450" y="132" text-anchor="middle" font-size="11" fill="#4338ca">DNS · alias records</text>

  <line x1="450" y1="146" x2="450" y2="186" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- CloudFront -->
  <rect x="350" y="188" width="200" height="60" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="450" y="213" text-anchor="middle" font-size="14" font-weight="600" fill="#5b21b6">CloudFront</text>
  <text x="450" y="232" text-anchor="middle" font-size="11" fill="#6d28d9">CDN · HTTPS via ACM cert</text>

  <!-- split to S3 and API GW -->
  <line x1="400" y1="248" x2="220" y2="310" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="500" y1="248" x2="680" y2="310" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- S3 -->
  <rect x="100" y="312" width="240" height="64" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="220" y="338" text-anchor="middle" font-size="14" font-weight="600" fill="#047857">S3 Bucket</text>
  <text x="220" y="357" text-anchor="middle" font-size="11" fill="#059669">Static site · private · OAC only</text>

  <!-- API Gateway -->
  <rect x="560" y="312" width="240" height="64" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="680" y="338" text-anchor="middle" font-size="14" font-weight="600" fill="#c2410c">API Gateway</text>
  <text x="680" y="357" text-anchor="middle" font-size="11" fill="#ea580c">HTTP API · POST /visitors</text>

  <line x1="680" y1="376" x2="680" y2="416" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Lambda -->
  <rect x="560" y="418" width="240" height="64" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="680" y="444" text-anchor="middle" font-size="14" font-weight="600" fill="#c2410c">Lambda</text>
  <text x="680" y="463" text-anchor="middle" font-size="11" fill="#ea580c">Node.js 24 · atomic increment</text>

  <line x1="680" y1="482" x2="680" y2="522" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- DynamoDB -->
  <rect x="560" y="524" width="240" height="64" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="680" y="550" text-anchor="middle" font-size="14" font-weight="600" fill="#1d4ed8">DynamoDB</text>
  <text x="680" y="569" text-anchor="middle" font-size="11" fill="#2563eb">VisitorCount table</text>

  <!-- dashed browser call -->
  <line x1="340" y1="344" x2="558" y2="344" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrow-dashed)"/>
  <text x="450" y="300" text-anchor="middle" font-size="10.5" fill="#64748b">Browser JS calls the API directly after the page loads</text>

  <!-- legend -->
  <rect x="60" y="560" width="14" height="14" rx="3" fill="#ecfdf5" stroke="#10b981"/>
  <text x="80" y="571" font-size="11" fill="#374151">Static site delivery path</text>
  <rect x="240" y="560" width="14" height="14" rx="3" fill="#fff7ed" stroke="#f97316"/>
  <text x="260" y="571" font-size="11" fill="#374151">Visitor counter path</text>
</svg>
